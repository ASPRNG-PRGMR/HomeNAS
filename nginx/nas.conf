server {
    listen 443 ssl;
    server_name nas.local;   # or your Tailscale hostname / IP

    ssl_certificate     /etc/ssl/nas/cert.pem;
    ssl_certificate_key /etc/ssl/nas/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Serve Web UI static files
    root home_path/nas/nas_main/webui;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/* to Drogon on localhost:8080
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow large uploads (unlimited — tune if needed)
        client_max_body_size 0;
        proxy_request_buffering off;

        # Streaming downloads — don't buffer in NGINX
        proxy_buffering off;
    }

    # Security headers
    add_header X-Frame-Options        DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection       "1; mode=block";
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name nas.local;
    return 301 https://$host$request_uri;
}
